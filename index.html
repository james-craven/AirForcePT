<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFPT Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grid-container">
        <div class="row1 flex">
            <div class="score-text flex padding-top-bot-1em">
                Score: 60.0 <br>
                FAIL: MINIMUM NOT MET!
            </div>
            <div class="info-btn-div flex">
                <button class="info-btn txt-sel-btn center-items">Info</button>
            </div>
        </div>
        <div class="row2 flex">
            <div class="sexSel center-items flex">
                <select name="" id="" class="sex-select txt-sel-btn">
                    <option value="">Lorem.</option>
                    <option value="">Non.</option>
                </select>
            </div>
            <div class="ageSel center-items flex">
                <select name="" id="" class="age-select txt-sel-btn">
                    <option value="">Lorem.</option>
                    <option value="">Adipisci.</option>
                    <option value="">Laborum.</option>
                    <option value="">Minus.</option>
                    <option value="">Labore.</option>
                </select>
            </div>
            <div class="calcScoreBtn center-items">
                <button class="info-btn center-items txt-sel-btn">CALCULATE SCORE</button>
            </div>
        </div>

            <div class="row3 flex">
                <div class="info-icon center-items flex">info-icon</div>
                <div class="strength-text center-items flex">Lorem ipsum dolor sit.</div>
            </div>
            <div class="row4 flex">
                <div class="pushSel center-items flex">
                    <select name="" id="" class="push-select txt-sel-btn">
                        <option value="">Lorem.</option>
                        <option value="">Quae?</option>
                    </select>
                </div>
                <div class="pushSlider flex">
                    <input class="center-items flex" type="range" min="0" max="47" step="1">
                </div>
                <div class="pushTxt flex center-items">
                    <input class="text-input center-items txt-sel-btn" value="" type="text" class="text-box" width="20" height="20" style="width: 20px; height: 20px;">
                </div>
            </div>
            <div class="row5 flex">
                <div class="info-icon flex center-items">info-icon</div>
                <div class="ab-text flex center-items">Lorem ipsum dolor sit amet.</div>
            </div>
            <div class="row6 flex">
                <div class="sitSel center-items flex">
                    <select name="" id="" class="push-select txt-sel-btn">
                        <option value="">Lorem.</option>
                        <option value="">Quae?</option>
                    </select>
                </div>
                <div class="sitSlider flex"></div>
                <div class="sitTxt flex"></div>
            </div>
            <div class="row7 flex">
                <div class="info-icon flex"></div>
                <div class="runTxt flex"></div>
            </div>
            <div class="row8 flex">
                <div class="runSel flex"></div>
                <div class="runMinTxt flex"></div>
                <div class="runSecTxt flex"></div>
            </div>
            <div class="row9 flex">
                <div class="runSlider flex"></div>
            </div>

    </div>
    
</body>
</html>
